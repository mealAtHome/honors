    <!-- ======================== -->
    <!-- 페이지용 타이틀 -->

        <div class="left"><gg-backbtn onclick="GFHM.close(true);"></gg-backbtn></div>
        <div class="center">재무현황</div>
    </ons-toolbar>

    <!-- ========================= -->
    <!-- 탭 -->
    <!-- ========================= -->
    <div class="common-div-cushion">
        <table class="GFHM-tbl-common common-tbl-tab commonEvent-tbl-tab">
            <tbody>
                <tr>
                    <td class="GFHM-td-maintab" val="finance" tab="tab" >재무현황</td>
                    <td class="GFHM-td-maintab" val="reflect" tab=""    >일정현황</td>
                </tr>
            </tbody>
        </table>
    </div>
    <hr class="common-hr-paddingLR"/>

    <!-- ========================= -->
    <!-- 재무현황 -->
    <!-- ========================= -->
    <style>
        #GFHM-tbl-grpfinance { width:100%; }
        #GFHM-tbl-grpfinance > tbody > tr > th { text-align: left; white-space: nowrap; padding: 0.4em 0.6em; width:30%; }
        #GFHM-tbl-grpfinance > tbody > tr > td { text-align: left; white-space: nowrap; padding: 0.4em 0.6em; }
        #GFHM-tbl-grpfinance > tbody > tr > th:nth-child(1) { width:10%; white-space:nowrap; }
        #GFHM-tbl-grpfinance > tbody > tr > th:nth-child(1) { font-size:0.9em; }
        #GFHM-tbl-grpfinance > tbody > tr > td:nth-child(2) { width:80%; white-space:nowrap; border-right : none; text-align: right; }
        #GFHM-tbl-grpfinance > tbody > tr > td:nth-child(3) { width:10%; white-space:nowrap; border-left  : none; }
    </style>
    <div class="GFHM-div-maintab" tab="finance" style="display:none;">
        <div class="common-div-cushion">
            <p class="common-p-title">재무현황</p>
        </div>

        <div class="common-div-cushion">
            <table id="GFHM-tbl-grpfinance" class="common-tbl-normal" tbl-type="normal">
                <tbody>
                    <tr>
                        <th><span>전체누적</span></th>
                        <td><span id="GFHM-span-totalall">0원</span></td>
                        <td><button class="common-btn-outline common-tag-fontsize09" style="visibility: hidden;">상세</button></td>
                    </tr>
                    <tr>
                        <th><span>자본금누적</span></th>
                        <td><span id="GFHM-span-totalnormal">0원</span></td>
                        <td><button class="GFHM-btn-subtabFin commonEvent-btn-radio common-btn-radio common-tag-fontsize09" radio_name="GFHM-btn-subtabFin" tab="" val="normal">상세</button></td>
                    </tr>
                    <tr>
                        <th><span>일정누적</span></th>
                        <td><span id="GFHM-span-totalcls">0원</span></td>
                        <td><button class="GFHM-btn-subtabFin commonEvent-btn-radio common-btn-radio common-tag-fontsize09" radio_name="GFHM-btn-subtabFin" tab="" val="cls">상세</button></td>
                    </tr>
                    <tr>
                        <th><span>미입금누적</span><br/><span class="common-tag-fontsize08">(전체누적포함X)</span></th>
                        <td><span id="GFHM-span-grpfncClssalesunpaidtotal">0원</span></td>
                        <td><button class="common-btn-outline common-tag-fontsize09" style="visibility: hidden;">상세</button></td>
                    </tr>
                    <tr>
                        <th><span>멤버잔여금총액</span><br/><span class="common-tag-fontsize08">(전체누적포함X)</span></th>
                        <td><span id="GFHM-span-grpfncMemberpointtotal">0원</span></td>
                        <td><button class="common-btn-outline common-tag-fontsize09" style="visibility: hidden;">상세</button></td>
                    </tr>
                    <tr>
                        <td colspan="3" class="common-tag-fontsize09">
                            <span id="GFHM-span-lastModified" class="common-tag-block"></span>
                            <div class="GFHM-div-commands common-tag-block" style="margin:0.3em 0em; display:none;">
                                <button class="common-btn-inline" id="GFHM-btn-recalByPk">재무현황 재계산</button>
                            </div>
                        </td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="normal" style="display:none;">
                        <th><span>자본금</span></th>
                        <td><span id="GFHM-span-grpfncCapitaltotal">0원</span></td>
                        <td><button id="GFHM-btn-grpfncCapitaltotalDetail" class="common-btn-outline common-tag-fontsize09">상세</button></td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="normal" style="display:none;">
                        <th><span>찬조누적</span></th>
                        <td><span id="GFHM-span-grpfncSponsorshiptotal">0원</span></td>
                        <td><button id="GFHM-btn-grpfncSponsorshiptotalDetail" class="common-btn-outline common-tag-fontsize09">상세</button></td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="normal" style="display:none;">
                        <th><span>구매누적</span></th>
                        <td><span id="GFHM-span-grpfncPurchasetotal">0원</span></td>
                        <td><button id="GFHM-btn-grpfncPurchasetotalDetail" class="common-btn-outline common-tag-fontsize09">상세</button></td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="normal" style="display:none;">
                        <th><span>손실누적</span></th>
                        <td><span id="GFHM-span-grpfncLosstotal">0원</span></td>
                        <td><button id="GFHM-btn-grpfncLosstotalDetail" class="common-btn-outline common-tag-fontsize09">상세</button></td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="cls" style="display:none;">
                        <th><span>일정청구누적</span></th>
                        <td><span id="GFHM-span-grpfncClssalestotal">0원</span></td>
                        <td><button class="common-btn-outline common-tag-fontsize09" style="visibility: hidden;">상세</button></td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="cls" style="display:none;">
                        <th><span>일정구매누적</span></th>
                        <td><span id="GFHM-span-grpfncClspurchasetotal">0원</span></td>
                        <td><button class="common-btn-outline common-tag-fontsize09" style="visibility: hidden;">상세</button></td>
                    </tr>
                    <tr class="GFHM-tr-subtabFin" tab="cls" style="display:none;">
                        <th><span>일정손실누적</span></th>
                        <td><span id="GFHM-span-grpfncClssaleslosstotal">0원</span></td>
                        <td><button class="common-btn-outline common-tag-fontsize09" style="visibility: hidden;">상세</button></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

    <!-- ========================= -->
    <!-- 재무설정 (테이블, 재무반영여부설정가능) -->
    <!-- ========================= -->
    <div class="GFHM-div-maintab" tab="reflect" style="display:none;">
        <div class="common-div-cushion">
            <p class="common-p-title">재무설정</p>
            <ul class="common-ul-announce">
                <li>아래 테이블에서 재무반영여부를 지정할 수 있습니다.</li>
                <li>모임 내에서 공식일정만 재무에 반영하는 기능입니다.</li>
            </ul>
        </div>
        <div class="common-div-cushion">
            <div id="GFHM-div-clsListForFinanceReflect" class="common-tag-fontsize09"></div>
        </div>
    </div>

    <script>
        var GFHM =
        {
            code : "GFHM",
            Data: {},

            show()
            {
                /* validation param */
                if(GFHM.Data.grpno          == undefined) { Common.toast("잘못된 접근입니다."); GFHM.close(); return; }
                if(GFHM.Data.pagenoForCls   == undefined) { GFHM.Data.pagenoForCls = 1; }
                if(GFHM.Data.maintab        == undefined) { GFHM.Data.maintab = "finance"; }
                if(GFHM.Data.subtabFin      == undefined) { GFHM.Data.subtabFin = ""; }

                /* init html */
                $(".GFHM-tr-subtabFin").hide();
                $(".GFHM-div-commands").hide();
                $(`.GFHM-td-maintab[val='${GFHM.Data.maintab}']`).click();

                /* get */
                Common.showProgress();
                setTimeout(function()
                {
                    try
                    {
                        /* var */
                        let grpno = GFHM.Data.grpno;

                        /* get grpm info */
                        let mGrpMember = Api.GrpMember.selectMeByGrpno(grpno);
                        if(mGrpMember.hasGrpmfinauth())
                            $(".GFHM-div-commands").show();

                        /* recover */
                        if(!Common.isEmpty(GFHM.Data.subtabFin))
                            $(`.GFHM-btn-subtabFin[val='${GFHM.Data.subtabFin}']`).click();
                    }
                    catch(e)
                    {
                        Common.catchProc(e);
                    }
                    Common.hideProgress();
                }, ajaxDelayTime);
            },

            search()
            {
                Common.showProgress();
                setTimeout(function()
                {
                    Common.hideProgress();
                }, ajaxDelayTime);
            },


            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                Navigation.moveBack();
            },
        }

        $(document).ready(function()
        {
            /* ========================= */
            /* event */
            /* ========================= */
            $("#GFHM-btn-grpfncCapitaltotalDetail")       .click(function() { Navigation.moveFrontPage(Navigation.Page.B1010GrpFinanceCapitalList,   {grpno:GFHM.Data.grpno, }); });
            $("#GFHM-btn-grpfncSponsorshiptotalDetail")   .click(function() { Navigation.moveFrontPage(Navigation.Page.B1020GrpFinanceSponsorList,   {grpno:GFHM.Data.grpno, }); });
            $("#GFHM-btn-grpfncPurchasetotalDetail")      .click(function() { Navigation.moveFrontPage(Navigation.Page.B1030GrpFinancePurchaseList,  {grpno:GFHM.Data.grpno, }); });
            $("#GFHM-btn-grpfncLosstotalDetail")          .click(function() { Navigation.moveFrontPage(Navigation.Page.B1040GrpFinanceLossList,      {grpno:GFHM.Data.grpno, }); });

            $(".GFHM-btn-subtabFin").click(function()
            {
                let subtabFin = $(this).attr("val");
                GFHM.Data.subtabFin = subtabFin;
                $(".GFHM-tr-subtabFin").hide();
                $(`.GFHM-tr-subtabFin[tab='${subtabFin}']`).show();
            });

            $(".GFHM-td-maintab").click(function()
            {
                /* 선택된 탭 표시 */
                let maintab = $(this).attr("val");
                $(".GFHM-td-maintab").removeAttr("tab");
                $(this).attr("tab", "tab");

                /* save selected */
                GFHM.Data.maintab = maintab;

                /* process */
                Common.showProgress();
                setTimeout(function()
                {
                    try
                    {
                        /* var */
                        let grpno = GFHM.Data.grpno;
                        let pagenoForCls = GFHM.Data.pagenoForCls;

                        /* 탭별표시 */
                        switch(maintab)
                        {
                            case "finance":
                            {
                                /* reset html */
                                $("#GFHM-td-totalCapital").html("-");
                                $("#GFHM-td-totalSettlebill").html("-");
                                $("#GFHM-td-totalPurchasebill").html("-");
                                $("#GFHM-td-netProfitbill").html("-");

                                /* get finance info */
                                let mGrpfnca = Api.Grpfnca.selectByPk(grpno).getModel();
                                if(mGrpfnca != null)
                                {
                                    $("#GFHM-span-totalall").html(mGrpfnca.getGrpfncTotalallWonColor());
                                    $("#GFHM-span-totalnormal").html(mGrpfnca.getGrpfncTotalnormalWonColor());
                                    $("#GFHM-span-totalcls").html(mGrpfnca.getGrpfncTotalclsWonColor());
                                    $("#GFHM-span-grpfncCapitaltotal").html(mGrpfnca.getGrpfncCapitaltotalWonColor());
                                    $("#GFHM-span-grpfncSponsorshiptotal").html(mGrpfnca.getGrpfncSponsorshiptotalWonColor());
                                    $("#GFHM-span-grpfncPurchasetotal").html(mGrpfnca.getGrpfncPurchasetotalWonColor());
                                    $("#GFHM-span-grpfncLosstotal").html(mGrpfnca.getGrpfncLosstotalWonColor());
                                    $("#GFHM-span-grpfncClssalestotal").html(mGrpfnca.getGrpfncClssalestotalWonColor());
                                    $("#GFHM-span-grpfncClssalesunpaidtotal").html(mGrpfnca.getGrpfncClssalesunpaidtotalWonColor());
                                    $("#GFHM-span-grpfncClssaleslosstotal").html(mGrpfnca.getGrpfncClssaleslosstotalWonColor());
                                    $("#GFHM-span-grpfncClspurchasetotal").html(mGrpfnca.getGrpfncClspurchasetotalWonColor());
                                    $("#GFHM-span-grpfncMemberpointtotal").html(mGrpfnca.getGrpfncMemberpointtotalWonColor());
                                    $("#GFHM-span-lastModified").html(`최근 업데이트: (${mGrpfnca.getModidtDiff()}) ${mGrpfnca.getModidt()}`);
                                }

                                break;
                            }
                            case "reflect":
                            {
                                /* get list with pagenation */
                                let mClss = Api.Cls.selectByGrpnoForMng(grpno, pagenoForCls);
                                mClss.makeTableForFinanceReflect("#GFHM-div-clsListForFinanceReflect");
                                break;
                            }
                        }
                        /* show / hide */
                        $(".GFHM-div-maintab").hide();
                        $(`.GFHM-div-maintab[tab='${maintab}']`).show();
                    }
                    catch(e)
                    {
                        Common.catchProc(e);
                    }
                    Common.hideProgress();
                }, ajaxDelayTime);
            });

            /* 재무현황 재계산 */
            $("#GFHM-btn-recalByPk").click(function()
            {
                let process = function()
                {
                    Common.showProgress();
                    setTimeout(function()
                    {
                        try
                        {
                            let mApiResponse = Api.Grpfnca.recalByPk(GFHM.Data.grpno);
                            if(mApiResponse.isSuccess())
                            {
                                Navigation.executeShow();
                                return;
                            }
                        }
                        catch(e)
                        {
                            Common.catchProc(e);
                        }
                        Common.hideProgress();
                    }, ajaxDelayTime);
                }
                Common.confirm2("재무현황을 재계산하시겠습니까?", process);
            });


            /* ========================= */
            /* page process */
            /* ========================= */

            /* get data from Config */
            try
            {
                GFHM.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                GFHM.close(true);
            }

        }); /* end function */

    </script>
</ons-page>
