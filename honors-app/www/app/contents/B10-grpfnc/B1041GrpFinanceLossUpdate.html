<ons-page id="GFLU">

    <!-- --------------- -->
    <!-- 페이지용 타이틀 -->
    <!-- --------------- -->
    <ons-toolbar id="GFLU-toolbar">
        <div class="left"><gg-backbtn onclick="GFLU.close(true);"></gg-backbtn></div>
        <div class="center"><span id="GFLU-span-title">손실추가</span></div>
    </ons-toolbar>

    <div class="common-div-formChild">

        <!-- --------------- -->
        <!-- 손실추가 -->
        <!-- --------------- -->
        <div class="GFLU-div-tab" tab="input">

            <!-- 타이틀 -->
            <div class="common-div-formTitle">
                <span>손실추가</span>
                <!-- <span class="GFLU-span-choosedPosition"></span> -->
                <div class="common-div-cushionUD">
                    <ul class="common-ul-announce">
                        <li>특정 사유로 재무 손실을 추가할 수 있습니다.</li>
                        <li>손실금액은 재무에 반영됩니다.</li>
                    </ul>
                </div>
            </div>

            <!-- 손실품목 -->
            <div id="GFLU-div-lossitem" class="common-div-formField">
                <span>*손실품목</span>
                <span></span>
                <input id="GFLU-input-lossitem" type="text" class="common-input-field" placeholder="손실품목"/>
            </div>

            <!-- 손실금액 -->
            <div class="common-div-formField">
                <span>*손실금액</span>
                <span>단발형인 경우, 대략의 액면가를 입력하세요. 값은 재무에 반영되지 않습니다.</span>
                <input id="GFLU-input-losscost" type="number" class="common-input-field" placeholder="손실금액"/>
                <div class="common-div-cushionUD">
                    <div class="common-tag-block"><span>입력금액 : </span><span id="GFLU-span-losscostWon"></span></div>
                </div>
            </div>

            <!-- 코멘트 입력 -->
            <div class="common-div-formField">
                <span>기타</span>
                <span></span>
                <textarea id="GFLU-textarea-losscomment" class="common-textarea-field" rows="5" placeholder="특이사항을 입력해주세요."></textarea>
            </div>

            <!-- 다음으로 -->
            <table class="common-tbl-slideformFooterBtn" tbl-type="button1">
                <tbody>
                    <tr>
                        <td><button id="GFLU-btn-apply" class="common-btn-inline">적용하기</button></td>
                    </tr>
                </tbody>
            </table>

        </div> <!-- 손실추가 -->

    </div> <!-- formChild -->

    <script>
        var GFLU =
        {
            code : "GFLU",
            Data: {},

            /* ===================== */
            /* show */
            /* ===================== */
            show()
            {
                if(Common.isEmpty(GFLU.Data.grpno)) { Common.toast("잘못된 접근입니다."); GFLU.close(true); return; }

                /* init */
                Common.showProgress();
                setTimeout(function()
                {
                    try
                    {
                    }
                    catch(e)
                    {
                        console.error(e);
                        Common.toast("오류가 발생했습니다.");
                        GFLU.close(true);
                        return;
                    }
                    finally
                    {
                        Common.hideProgress();
                    }
                }, ajaxDelayTime);
            },

            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                if(force == true)
                {
                    Navigation.moveBack();
                    return;
                }
                Navigation.moveBack();
            },
        }

        $(document).ready(function()
        {
            /* ======================== */
            /* event */
            /* ======================== */

            /* 손실타입 : 멤버선택 */
            $("#GFLU-btn-lossChoose").click(function()
            {
                let grpno = $(this).attr("grpno");
                let el = "#GFLU-div-lossMember";
                let data =
                {
                    option : "makeToEl",
                    grpno : GFLU.Data.grpno,
                    el : el,
                }
                Navigation.moveFrontDialog(Navigation.Page.S10ChooseGrpMember, data);
            });

            /* 금액 입력 시, 업데이트 */
            $("#GFLU-input-losscost").keyup(function()
            {
                let losscost = Number($("#GFLU-input-losscost").val().trim());
                $("#GFLU-span-losscostWon").html(GGC.Common.priceWon(losscost) );
            });

            /* 저장 */
            $("#GFLU-btn-apply").click(function()
            {
                let grpno = GFLU.Data.grpno;
                let lossitem = $("#GFLU-input-lossitem").val().trim();
                let losscost = $("#GFLU-input-losscost").val().trim();
                let losscomment = $("#GFLU-textarea-losscomment").val().trim();

                /* process */
                let process = function()
                {
                    Common.showProgress();
                    setTimeout(function()
                    {
                        let mApiResponse = Api.GrpfncLoss.insertFromPage(grpno, lossitem, losscost, losscomment, GGF.toast, GGF.toast);
                        if(mApiResponse.isSuccess())
                        {
                            Common.hideProgress();
                            return;
                        }
                        Common.hideProgress();
                    }, ajaxDelayTime);
                };
                Common.confirm2(`적용하시겠습니까?`, process);
            });

            /* ========================= */
            /* page process */
            /* ========================= */

            /* get data from Config */
            try
            {
                GFLU.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                GFLU.close(true);
            }

        });

    </script>


</ons-page>
