<ons-page id="CUTF">

    <style>
        .CUTF-input-common      { font-size: 1em; }
        .CUTF-input-lineupname  { width: 10em; }
        .CUTF-input-position    { width: 5em; }
        .CUTF-input-user        { width: 5em; }
        .CUTF-input-bill        { width: 5em; }
        .CUTF-btn-delete        { font-size: 0.9em; }
        .CUTF-tbl-lineup > tbody > tr > td { text-align: center; vertical-align: middle; }
        .CUTF-tbl-lineup > tbody > tr > td[col="numb"] { width: 5%; }
        .CUTF-tbl-lineup > tbody > tr > td[col="pstn"] { width: 15%; }
        .CUTF-tbl-lineup > tbody > tr > td[col="user"] { width: 15%; }
        .CUTF-tbl-lineup > tbody > tr > td[col="bill"] { width: 15%; }
        .CUTF-tbl-lineup > tbody > tr > td[col="delt"] { width: 10%; }

        #CUTF-div-lineupFix { display: block; }
        #CUTF-div-lineupBtn { display: block; }
        #CUTF-div-lineupBtn > button { margin-top: 0.5em; }
    </style>


    <!-- ========================== -->
    <!-- 참가설정 페이지 -->
    <!-- ========================== -->
    <ons-toolbar>
        <ons-toolbar>
            <div class="left"><gg-backbtn onclick="CUTF.close(true);"></gg-backbtn></div>
            <div class="center"><span style="vertical-align:middle;">참가설정</span></div>
            <div class="right"></div>
        </ons-toolbar>
    </ons-toolbar>

    <!-- ======================== -->
    <!-- main page -->
    <!-- ======================== -->
    <div class="common-div-cushion">

        <div id="CUTF-div-lineupFix" class="common-tag-fontsize09">
            <button id="CUTF-btn-save" class="common-btn-outline">💿저장</button>
            <button id="CUTF-btn-lineupAdd" class="common-btn-outline">➕추가</button>
            <button id="CUTF-btn-lineuptmp" class="common-btn-outline">🗃️템플릿</button>
        </div>
        <div id="CUTF-div-lineupBtn" class="common-tag-fontsize09"></div>
        <hr class="common-hr-paddingUD"/>
        <div id="CUTF-div-lineupDetails"></div>
    </div>

    <script>

        var CUTF =
        {
            code : "CUTF",
            Data: {},
            Temp :
            {
                lineupidx : 0,
                nextLineupidx : 1,
                mCls : null,
                mClslineupaModels : [],
                mClslineupbModels : [],
            },
            isClsstatusIng()        { return CUTF.Temp.mCls != null && CUTF.Temp.mCls.isClsstatusIng(); },
            getClsbillapplyprice()  { return CUTF.Temp.mCls != null ? CUTF.Temp.mCls.getClsbillapplyprice() : 0; },
            El :
            {
                getTbl (lineupidx="") { return `.CUTF-tbl-lineup[lineupidx="${lineupidx == "" ? CUTF.Temp.lineupidx : lineupidx}"]`; },
                getTr  (lineupidx="") { return `.CUTF-tbl-lineup[lineupidx="${lineupidx == "" ? CUTF.Temp.lineupidx : lineupidx}"] > tbody > tr`; },
            },

            show()
            {
                /* validation */
                if(CUTF.Data.option == undefined) { Common.toast("잘못된 접근입니다."); CUTF.close(); return; }
                if(CUTF.Data.grpno == undefined) { Common.toast("잘못된 접근입니다."); CUTF.close(); return; }
                if(CUTF.Data.clsno == undefined) CUTF.Data.clsno = "";

                /* init */
                Common.showProgress();
                setTimeout(function()
                {
                    /* vars */
                    let clsno = CUTF.Data.clsno;
                    let grpno = CUTF.Data.grpno;

                    /* reset dynamic containers */
                    $("#CUTF-div-lineupBtn").empty();
                    $("#CUTF-div-lineupDetails").empty();
                    CUTF.Temp.nextLineupidx = 1;

                    /* ----- */
                    /* get cls */
                    /* ----- */
                    CUTF.Temp.mCls = Api.Cls.selectByPkForMng(grpno, clsno, GGF.none, GGF.toast);

                    /* ----- */
                    /* get clslineupa and build tabs */
                    /* ----- */
                    CUTF.Temp.mClslineupaModels = Api.Clslineupa.selectByClsno(grpno, clsno, GGF.none, GGF.toast).getModels();
                    for(let i in CUTF.Temp.mClslineupaModels)
                    {
                        let model = CUTF.Temp.mClslineupaModels[i];
                        CUTF.addLineup(model.getLineupidx(), model.getLineupname());
                        if(model.getLineupidx() >= CUTF.Temp.nextLineupidx)
                            CUTF.Temp.nextLineupidx = model.getLineupidx() + 1;
                    }

                    /* ----- */
                    /* get clslineupb */
                    /* ----- */
                    CUTF.Temp.mClslineupbModels = Api.Clslineupb.selectByClsno(grpno, CUTF.Data.clsno, GGF.none, GGF.toast).getModels();

                    /* recovery db values */
                    for(let i in CUTF.Temp.mClslineupbModels)
                    {
                        let model = CUTF.Temp.mClslineupbModels[i];
                        CUTF.Temp.lineupidx = model.getLineupidx();
                        CUTF.addRow(model);
                    }

                    /* recovery row numbers for each lineup */
                    $(".CUTF-div-tabTeam").each(function()
                    {
                        let lineupidx = $(this).attr("lineupidx");
                        CUTF.Temp.lineupidx = parseInt(lineupidx);
                        CUTF.updateRowNum();
                    });

                    /* recovery db values */
                    for(let i in CUTF.Temp.mClslineupbModels)
                    {
                        let model = CUTF.Temp.mClslineupbModels[i];

                        /* set lineupname */
                        $(`.CUTF-input-lineupname[lineupidx="${model.getLineupidx()}"]`).val(model.getLineupname());

                        /* set rows */
                        let tr = $(`.CUTF-tbl-lineup[lineupidx="${model.getLineupidx()}"] > tbody > tr[orderno="${model.getOrderno()}"]`);
                        tr.find(`.CUTF-select-orderno`).val(model.getOrderno());
                        tr.find(`.CUTF-input-battingflg`).prop("checked", model.isBattingflgY());
                        tr.find(`.CUTF-input-position`).val(model.getPosition());
                        tr.find(`.CUTF-input-user`).val(model.getUsername()).attr("userno", model.getUserno());
                        tr.find(`.CUTF-input-bill`).val(model.getBill());
                        tr.attr("datatype", "old");

                        /* if clsstatus is ING, disable inputs */
                        if(CUTF.isClsstatusIng())
                        {
                            tr.find(`.CUTF-input-battingflg`).prop("disabled", true);
                            tr.find(`.CUTF-input-position`).prop("disabled", true);
                            tr.find(`.CUTF-input-user`).prop("disabled", true);
                            tr.find(`.CUTF-btn-delete`).prop("disabled", true);
                        }
                    }

                    /* click first tab */
                    $("#CUTF-div-lineupBtn").find(".CUTF-btn-tabTeam").first().click();

                    Common.hideProgress();
                }, ajaxDelayTime);
            },

            addLineup(lineupidx, lineupname)
            {
                /* tab button */
                let btnHtml =
                `
                    <button
                        class="CUTF-btn-tabTeam commonEvent-btn-radio common-btn-radio"
                        radio_name="CUTF-btn-tabTeam"
                        style="padding-left:0.8em; padding-right:0.8em;"
                        lineupidx="${lineupidx}"
                    >
                        ${lineupname == "" ? lineupidx : lineupname}
                    </button>`;
                $("#CUTF-div-lineupBtn").append(btnHtml);

                /* tab content */
                let contentHtml =
                `
                    <div class="CUTF-div-tabTeam" lineupidx="${lineupidx}" style="display:none;">
                        <p class="common-p-title">
                            <span>팀 명 : </span>
                            <input type="text" class="CUTF-input-lineupname CUTF-input-common common-input-text common-tag-fontsize09" lineupidx="${lineupidx}" value="${lineupname}">
                        </p>
                        <div class="common-div-cushionUD common-tag-fontsize09">
                            <button class="common-btn-outline CUTF-btn-deleteLineup" btn-type="delete" lineupidx="${lineupidx}">🗑️삭제</button>
                            <button class="common-btn-outline CUTF-btn-rowAdd">➕행추가</button>
                            <button class="common-btn-outline CUTF-btn-lineuptmp" class="common-btn-outline" lineupidx="${lineupidx}">🗃️템플릿</button>
                        </div>

                        <div class="common-div-scrollX">
                            <table class="common-tbl-normal CUTF-tbl-lineup" lineupidx="${lineupidx}" tbl-type="rowborder">
                                <thead>
                                    <tr>
                                        <th>삭제</th>
                                        <th>번호</th>
                                        <th>타격여부</th>
                                        <th>포지션</th>
                                        <th>참가자</th>
                                        <th>참가비</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- 동적으로 행이 추가됩니다 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                $("#CUTF-div-lineupDetails").append(contentHtml);

                /* 라인업 버튼 */
                $(`.CUTF-btn-tabTeam`).off("click").on("click", function()
                {
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    $(".CUTF-div-tabTeam").hide();
                    $(`.CUTF-div-tabTeam[lineupidx="${lineupidx}"]`).show();
                    CUTF.Temp.lineupidx = lineupidx;
                });

                /* 라인업 이름을 수정하면, 버튼이름에 반영 */
                $(`.CUTF-input-lineupname`).off("input").on("input", function()
                {
                    let val = $(this).val();
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    $(`.CUTF-btn-tabTeam[lineupidx="${lineupidx}"]`).text(val);
                });

                /* 삭제 */
                $(`.CUTF-btn-deleteLineup`).off("click").on("click", function()
                {
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    let process = function()
                    {
                        $(`.CUTF-btn-tabTeam[lineupidx="${lineupidx}"]`).remove();
                        $(`.CUTF-div-tabTeam[lineupidx="${lineupidx}"]`).remove();
                        if($(`.CUTF-btn-tabTeam[lineupidx="${lineupidx+1}"]`).length > 0) { $(`.CUTF-btn-tabTeam[lineupidx="${lineupidx+1}"]`).click(); return; }
                        if($(`.CUTF-btn-tabTeam[lineupidx="${lineupidx-1}"]`).length > 0) { $(`.CUTF-btn-tabTeam[lineupidx="${lineupidx-1}"]`).click(); return; }
                    };

                    if($(CUTF.El.getTr()).length == 0)
                    {
                        process();
                        return;
                    }
                    Common.confirm2("라인업을 삭제하시겠습니까?", process);
                });

                /* 행 추가 */
                $(".CUTF-btn-rowAdd").off("click").on("click", function()
                {
                    if($(CUTF.El.getTr()).length >= 30)
                    {
                        Common.toast("최대 30명의 참가자를 등록할 수 있습니다.");
                        return;
                    }
                    CUTF.addRow(null);
                    CUTF.updateRowNum();
                });

                /* 템플릿 */
                $(".CUTF-btn-lineuptmp").off("click").on("click", function()
                {
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    CUTF.Data.executeShowWhenClose = false;
                    Navigation.moveFrontDialog(Navigation.Page.F10ClassUpdate011Lineuptmp, {grpno:CUTF.Data.grpno, clsno:CUTF.Data.clsno, lineupidx:lineupidx, });
                });
            },

            addRow(mClslineupb=null)
            {
                let html =
                `
                    <tr class="CUTF-tr-lineup" orderno="" datatype="new">
                        <td col="delt"><button class="common-btn-outline CUTF-btn-delete" btn-type="cancel" orderno="">삭제</button></td>
                        ${CUTF.isClsstatusIng() == false ? `<td col="numb"><select class="common-select-outline CUTF-select-orderno" orderno=""></select></td>` : ""}
                        ${CUTF.isClsstatusIng() == true  ? `<td col="numb"><span class="CUTF-span-orderno"></span></td>` : ""}
                        <td col="batf"><label class="common-label-switch"><input type="checkbox" class="CUTF-input-battingflg" checked                                  orderno=""/><span></span></label></td>
                        <td col="pstn"><input type="text"    class="common-input-text CUTF-input-common CUTF-input-position"   value=""                                 orderno=""/></td>
                        <td col="user"><input type="text"    class="common-input-text CUTF-input-common CUTF-input-user"       value=""                                 orderno="" disabled/></td>
                        <td col="bill"><input type="number"  class="common-input-text CUTF-input-common CUTF-input-bill"       value="${CUTF.getClsbillapplyprice()}"   orderno=""/></td>
                    </tr>
                `;
                $(`${CUTF.El.getTbl()} > tbody`).append(html);
            },

            updateRowNum()
            {
                let len = $(CUTF.El.getTr()).length;
                $(CUTF.El.getTr()).each(function(orderno0)
                {
                    let orderno         = orderno0 + 1;
                    let deleteEl        = $(this).find('.CUTF-btn-delete');
                    let ordernoEl       = $(this).find('.CUTF-select-orderno');
                    let battingflgEl    = $(this).find('.CUTF-input-battingflg');
                    let positionEl      = $(this).find('.CUTF-input-position');
                    let userEl          = $(this).find('.CUTF-input-user');
                    let billEl          = $(this).find('.CUTF-input-bill');

                    /* if clsstatus is ING, ordernoEl is "CUTF-span-orderno" */
                    if(CUTF.isClsstatusIng())
                    {
                        ordernoEl = $(this).find('.CUTF-span-orderno');
                        ordernoEl.html(orderno);
                    }
                    else
                    {
                        ordernoEl.html("");
                        for(let i = 1; i <= len; i++)
                            ordernoEl.append(`<option value="${i}" ${orderno == i ? "selected" : ""}>${i}</option>`);
                    }

                    /* set orderno */
                    $(this).attr("orderno", orderno);
                    deleteEl.attr("orderno", orderno);
                    ordernoEl.attr("orderno", orderno);
                    battingflgEl.attr("orderno", orderno);
                    positionEl.attr("orderno", orderno);
                    userEl.attr("orderno", orderno);
                    billEl.attr("orderno", orderno);
                });
                CUTF.setRowEvent();
            },

            setRowEvent()
            {
                $(".CUTF-btn-delete").off("click").on("click", function()
                {
                    let orderno = $(this).attr('orderno');
                    $(`${CUTF.El.getTr()}[orderno="${orderno}"]`).remove();
                    console.log(CUTF.El.getTr(), orderno);
                    CUTF.updateRowNum();
                });

                /* change tr sort */
                $(".CUTF-select-orderno").off("change").on("change", function()
                {
                    let orderno = $(this).attr('orderno');
                    let val = $(this).val();
                    if(orderno > val) /* move up */
                        $(`${CUTF.El.getTr()}[orderno="${orderno}"]`).insertBefore($(`${CUTF.El.getTr()}[orderno="${val}"]`));
                    else if(orderno < val) /* move down */
                        $(`${CUTF.El.getTr()}[orderno="${orderno}"]`).insertAfter($(`${CUTF.El.getTr()}[orderno="${val}"]`));
                    CUTF.updateRowNum();
                });
            },

            getLineupData()
            {
                let data = [];
                $(".CUTF-tbl-lineup").each(function()
                {
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    let lineupname = $(`.CUTF-input-lineupname[lineupidx="${lineupidx}"]`).val();
                    $(this).find("tbody").find("tr").each(function()
                    {
                        let datatype        = $(this).attr("datatype");
                        let ordernoEl       = $(this).find('.CUTF-select-orderno');
                        let battingflgEl    = $(this).find('.CUTF-input-battingflg');
                        let positionEl      = $(this).find('.CUTF-input-position');
                        let userEl          = $(this).find('.CUTF-input-user');
                        let billEl          = $(this).find('.CUTF-input-bill');

                        /* set orderno */
                        let orderno = ordernoEl.val();
                        if(CUTF.isClsstatusIng())
                            orderno = $(this).find('.CUTF-span-orderno').text();

                        data.push
                        ({
                            DATATYPE    : datatype,
                            LINEUPIDX   : lineupidx,
                            LINEUPNAME  : lineupname,
                            ORDERNO     : orderno,
                            BATTINGFLG  : battingflgEl.is(':checked') ? "y" : "n",
                            POSITION    : positionEl.val(),
                            USERNAME    : userEl.val(),
                            USERNO      : userEl.attr("userno"),
                            BILL        : billEl.val(),
                        });
                    });
                });
                return data;
            },

            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                if(force == true)
                {
                    Navigation.moveBack();
                    return;
                }
                Common.confirmClose();
            },
        };


        $(document).ready(function()
        {
            /* =============================== */
            /* events */
            /* =============================== */
            $("#CUTF-btn-lineuptmp").click(function()
            {
                CUTF.Data.executeShowWhenClose = false;
                Navigation.moveFrontDialog(Navigation.Page.F10ClassUpdate011Lineuptmp, {grpno:CUTF.Data.grpno, clsno:CUTF.Data.clsno, });
            });
            $("#CUTF-btn-lineupAdd").click(function()
            {
                CUTF.addLineup(CUTF.Temp.nextLineupidx++, "");
                $("#CUTF-div-lineupBtn").find(".CUTF-btn-tabTeam").last().click();
            });

            /* ---------------------- */
            /* 등록 */
            /* ---------------------- */
            $("#CUTF-btn-save").click(function()
            {
                /* validation: each lineup must have a name */
                let validationOK = true;
                $(".CUTF-div-tabTeam").each(function()
                {
                    let li = $(this).attr("lineupidx");
                    let name = $(`.CUTF-input-lineupname[lineupidx="${li}"]`).val();
                    if(Common.isEmpty(name)) { Common.toastError("라인업 이름을 입력해주세요."); validationOK = false; return false; }
                });
                if(!validationOK) return;

                /* get data */
                let data = CUTF.getLineupData();

                /* save */
                Common.showProgress();
                setTimeout(function()
                {
                    let mApiResponse = Api.Clslineupb.updateFromPage(CUTF.Data.grpno, CUTF.Data.clsno, data, GGF.toast, GGF.toast);
                    // if(mApiResponse.isSuccess())

                    Common.hideProgress();
                }, ajaxDelayTime);
            });

            /* ========================= */
            /* page process */
            /* ========================= */

            /* get data from Config */
            try
            {
                CUTF.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                CUTF.close(true);
            }

            /* localizing */
            /* $("#CUTF").i18n(); */

        });

    </script>
</ons-page>
