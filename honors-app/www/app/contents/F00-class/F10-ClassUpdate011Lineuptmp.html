<ons-page id="CULT">

    <!-- --------------- -->
    <!-- 페이지용 타이틀 -->
    <!-- --------------- -->
    <ons-toolbar id="CULT-toolbar">
        <div class="left"><gg-backbtn class="CULT-btn-back"></gg-backbtn></div>
        <div class="center"><span>라인업템플릿</span></div>
    </ons-toolbar>

    <!-- --------------- -->
    <!-- 화면 진입 시 -->
    <!-- --------------- -->
    <div id="CULT-div-menuTop" class="common-div-cushion">
        <ul class="common-ul-announce">
            <li>라인업 템플릿을 저장하고 불러올 수 있는 페이지입니다.</li>
        </ul>
        <style>
            #CULT-tbl-menuTop > tbody > tr > td { text-align: center; word-break: keep-all; }
            .CULT-btn-menu
            {
                min-width: 6.5em;
                height: 2.4em;
                margin: 0.4em 0.4em;
            }
        </style>
        <div class="common-div-cushionUD">
            <table id="CULT-tbl-menuTop" class="common-tbl-normal" tbl-type="colborder">
                <tbody>
                    <tr>
                        <td><button class="common-btn-outline CULT-btn-menu" id="CULT-btn-toSaveTab">저장하기</button></td>
                        <td><button class="common-btn-outline CULT-btn-menu" id="CULT-btn-toLoadTab">불러오기</button></td>
                    </tr>
                    <tr>
                        <td style="line-height:1.6em;">현재 라인업을 템플릿으로 저장</td>
                        <td style="line-height:1.6em;">템플릿 혹은 최근일정에서 라인업 가져오기</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ======================== -->
    <!-- 저장 탭 -->
    <!-- ======================== -->
    <div id="CULT-div-savetop" class="common-div-formChild" style="display:none;">

        <!-- 템플릿 이름 -->
        <div class="common-div-formField">
            <span>*템플릿 이름</span>
            <span>저장할 템플릿의 이름을 설정해주세요.</span>
            <input id="CULT-input-lineuptitle" type="text" class="common-input-field" placeholder="템플릿 이름"/>
        </div>

        <!-- 라인업 html -->
        <style>
            .CULT-tbl-lineupTeam > tbody > tr > td { text-align: center; }
        </style>
        <div class="common-div-formField">
            <span>*라인업 확인</span>
            <span>저장하려고 하는 라인업이 다르다면 수정 후, 다시 이 창을 열어주세요.</span>
            <div class="CULT-div-lineupBtn common-tag-fontsize09" div-type="save"></div>
            <hr class="common-hr-paddingUD"/>
            <div class="CULT-div-lineupDetails" div-type="save"></div>
        </div>

        <!-- 저장 버튼 -->
        <table class="common-tbl-slideformFooterBtn" tbl-type="button1">
            <tbody>
                <tr>
                    <td><button id="CULT-btn-save" class="common-btn-inline">저장</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- ======================== -->
    <!-- 불러오기 탭 -->
    <!-- ======================== -->
    <div id="CULT-div-loadtop" style="display:none;">
        <div class="common-div-cushion">
            <table class="CULT-tbl-common common-tbl-tab commonEvent-tbl-tab">
                <tbody>
                    <tr>
                        <td class="CULT-td-loadtab" loadtab="def"  tab="">기본</td>
                        <td class="CULT-td-loadtab" loadtab="tmp"  tab="">템플릿</td>
                        <td class="CULT-td-loadtab" loadtab="cls"  tab="">최근일정</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <hr class="common-hr-paddingLR"/>
    </div>

    <!-- 리스트 탭 -->
    <div id="CULT-div-defList" class="CULT-div-loadtab common-div-cushion" style="display:none;" loadtab="def"></div> <!-- 템플릿 탭 -->
    <div id="CULT-div-tmpList" class="CULT-div-loadtab common-div-cushion" style="display:none;" loadtab="tmp"></div> <!-- 템플릿 탭 -->
    <div id="CULT-div-clsList" class="CULT-div-loadtab common-div-cushion" style="display:none;" loadtab="cls"></div> <!-- 최근일정 탭 -->

    <!-- ======================== -->
    <!-- 라인업 상세 (hidden) -->
    <!-- ======================== -->
    <div id="CULT-div-tmpDetail" class="common-div-cushion" style="display:none;">

        <!-- header -->
        <div class="CULT-div-detailHeader"></div>
        <hr class="common-hr-paddingUD"/>

        <!-- lineup details -->
        <div class="CULT-div-lineupBtn common-tag-fontsize09" div-type="tmp"></div>
        <div class="CULT-div-lineupDetails" div-type="tmp"></div>

        <!-- footer buttons -->
        <table class="common-tbl-slideformFooterBtn" tbl-type="liner2">
            <tbody>
                <tr>
                    <td><button id="CULT-btn-tmpApply" class="common-btn-inline">현재라인업 적용</button></td>
                    <td><button id="CULT-btn-tmpApply" class="common-btn-inline">전체라인업 적용</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        var CULT =
        {
            code : "CULT",
            Data: {},
            Temp:
            {
                lineupidx: null,
            },
            Const:
            {
                PAGE_MENU:"menu",
                PAGE_SAVE:"save",
                PAGE_LOAD:"load",
                PAGE_LDTL:"ldtl", /* lineup detail */
            },

            /* ===================== */
            /* show */
            /* ===================== */
            show()
            {
                if(CULT.Data.grpno      == undefined) { Common.toast("잘못된 접근입니다."); CULT.close(true); return; }
                if(CULT.Data.tab        == undefined) { CULT.Data.tab = "def"; }
                if(CULT.Data.pagenumcls == undefined) { CULT.Data.pagenumcls = 1; }
                if(CULT.Data.clsno      == undefined) { CULT.Data.clsno = ""; }
                if(CULT.Data.page       == undefined) { CULT.Data.page = CULT.Const.PAGE_MENU; }
            },

            /* ========================= */
            /* div 이동 */
            /* ========================= */
            movePage(from, to)
            {
                switch(from)
                {
                    case CULT.Const.PAGE_MENU: { $("#CULT-div-menuTop").hide(); break; }
                    case CULT.Const.PAGE_SAVE: { $("#CULT-div-savetop").hide(); break; }
                    case CULT.Const.PAGE_LOAD: { $("#CULT-div-loadtop").hide(); break; }
                    case CULT.Const.PAGE_LDTL: { $("#CULT-div-tmpDetail").hide(); break; }
                }
                switch(to)
                {
                    case CULT.Const.PAGE_MENU: { $("#CULT-div-menuTop").show(); break; }
                    case CULT.Const.PAGE_SAVE: { $("#CULT-div-savetop").show(); break; }
                    case CULT.Const.PAGE_LOAD: { $("#CULT-div-loadtop").show(); $(`.CULT-td-loadtab[loadtab=${CULT.Data.tab}]`).click(); break; }
                    case CULT.Const.PAGE_LDTL: { $("#CULT-div-tmpDetail").show(); break; }
                }
                CULT.Data.page = to;
            },
            movePageToLineupDetail()
            {
                $("#CULT-div-defList").hide();
                $("#CULT-div-tmpList").hide();
                $("#CULT-div-clsList").hide();
                $("#CULT-div-loadtop").hide();
                $("#CULT-div-tmpDetail").show();
                CULT.Data.page = CULT.Const.PAGE_LDTL;
            },
            moveBack()
            {
                switch(CULT.Data.page)
                {
                    case CULT.Const.PAGE_MENU: { CULT.close(); break; }
                    case CULT.Const.PAGE_SAVE: { CULT.Data.page = CULT.Const.PAGE_MENU; $("#CULT-div-savetop").hide();   $("#CULT-div-menuTop").show(); break; }
                    case CULT.Const.PAGE_LOAD: { CULT.Data.page = CULT.Const.PAGE_MENU; $("#CULT-div-loadtop").hide();   $("#CULT-div-menuTop").show(); $(`.CULT-div-loadtab`).hide(); break; }
                    case CULT.Const.PAGE_LDTL: { CULT.Data.page = CULT.Const.PAGE_LOAD; $("#CULT-div-tmpDetail").hide(); $("#CULT-div-loadtop").show(); $(`.CULT-div-loadtab[loadtab="${CULT.Data.tab}"]`).show(); break; }
                }
            },


            /* ========================= */
            /* 저장 탭 */
            /* ========================= */
            addLineupBox(divType, lineupidx, lineupname)
            {
                /* check duplicated */
                let dup = false;
                $(`.CULT-div-lineupTab[div-type='${divType}']`).each(function()
                {
                    if(parseInt($(this).attr("lineupidx")) == lineupidx)
                        dup = true;
                });
                if(dup)
                    return;

                /* ----- */
                /* tab button */
                /* ----- */
                let btnForLineupTab =
                `
                    <button
                        class="CULT-btn-lineupTab commonEvent-btn-radio common-btn-radio"
                        radio_name="CULT-btn-lineupTab"
                        style="padding-left:0.8em; padding-right:0.8em;"
                        lineupidx="${lineupidx}"
                        div-type="${divType}"
                    >
                        ${lineupname == "" ? lineupidx : lineupname}
                    </button>`;
                $(`.CULT-div-lineupBtn[div-type='${divType}']`).append(btnForLineupTab);

                /* ----- */
                /* tab content */
                /* ----- */
                let btnHtml = "";
                switch(divType)
                {
                    case "save" : { btnHtml = `<button class="CULT-btn-deleteLineup common-btn-outline common-tag-fontsize09" btn-type="delete" div-type="${divType}" lineupidx="${lineupidx}" style="margin-left:1em;">삭제</button>`; break; }
                    case "tmp"  : { btnHtml = ``; break; }
                }

                let contentHtml =
                `
                    <div class="CULT-div-lineupTab" div-type="${divType}" lineupidx="${lineupidx}" style="display:none;">
                        <div class="common-div-cushionUD">
                            <div style="display:inline-block;"><span>팀 명 : </span><span class="CULT-span-lineupname">${lineupname}</span></div>
                            ${btnHtml}
                        </div>
                        <div class="common-div-scrollX">
                            <table class="common-tbl-normal CULT-tbl-lineupTeam" div-type="${divType}" lineupidx="${lineupidx}" tbl-type="rowborder">
                                <thead>
                                    <tr>
                                        <th>번호</th>
                                        <th>타격여부</th>
                                        <th>포지션</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <!-- 동적으로 행이 추가됩니다 -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
                $(`.CULT-div-lineupDetails[div-type='${divType}']`).append(contentHtml);
            },
            addLineupRow(divType, dat)
            {
                let html =
                `
                    <tr class="CULT-tr-lineup" div-type="${divType}" lineupidx="${dat.LINEUPIDX}">
                        <td col="numb" orderno="${dat.ORDERNO}"       >${dat.ORDERNO}</td>
                        <td col="batf" battingflg="${dat.BATTINGFLG}" >${dat.BATTINGFLG == GGF.Y ? "타격" : "-"}</td>
                        <td col="pstn" position="${dat.POSITION}"     >${dat.POSITION}</td>
                    </tr>
                `;
                $(`.CULT-tbl-lineupTeam[div-type='${divType}'][lineupidx="${dat.LINEUPIDX}"] > tbody`).append(html);
            },
            addLineupEvent()
            {
                /* 라인업 버튼 */
                $(`.CULT-btn-lineupTab`).off("click").on("click", function()
                {
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    let divType = $(this).attr("div-type");
                    $(`.CULT-div-lineupTab[div-type='${divType}']`).hide();
                    $(`.CULT-div-lineupTab[div-type='${divType}'][lineupidx="${lineupidx}"]`).show();
                    CULT.Temp.lineupidx = lineupidx;
                });

                /* 삭제버튼 */
                $(`.CULT-btn-deleteLineup`).off("click").on("click", function()
                {
                    let lineupidx = parseInt($(this).attr("lineupidx"));
                    let divType = $(this).attr("div-type");
                    let process = function()
                    {
                        $(`.CULT-div-lineupTab[div-type='${divType}'][lineupidx="${lineupidx}"]`).remove();
                        $(`.CULT-btn-lineupTab[div-type='${divType}'][lineupidx="${lineupidx}"]`).remove();
                        $(`.CULT-div-lineupBtn[div-type='${divType}']`).find(".CULT-btn-lineupTab").first().click();
                    }
                    Common.confirm2("이 라인업을 삭제하시겠습니까?", process);
                });

                /* 적용버튼 */

            },

            /* ========================= */
            /* 템플릿 탭 */
            /* ========================= */
            setEventForTmpTab()
            {
                /* 상세보기 버튼 */
                $(".CULT-btn-clslineuptmpaDetail").off("click").on("click", function()
                {
                    let lineupgroup = $(this).attr("lineupgroup");
                    Common.showProgress();
                    setTimeout(function()
                    {
                        let mClslineuptmpas = Api.Clslineuptmpa.selectByPk(CULT.Data.grpno, lineupgroup);
                        let mClslineuptmpbs = Api.Clslineuptmpb.selectByLineupgroup(CULT.Data.grpno, lineupgroup);
                        let mClslineuptmpcs = Api.Clslineuptmpc.selectByLineupgroup(CULT.Data.grpno, lineupgroup);
                        let mClslineuptmpaModel  = mClslineuptmpas.getModel();
                        let mClslineuptmpbModels = mClslineuptmpbs.getModels();
                        let mClslineuptmpcModels = mClslineuptmpcs.getModels();

                        /* clear html */
                        $(".CULT-div-lineupBtn[div-type=tmp]").empty();
                        $(".CULT-div-lineupDetails[div-type=tmp]").empty();

                        /* set title */
                        $(".CULT-div-detailHeader").html(mClslineuptmpaModel.make());
                        /* $("#CULT-span-tmpLineuptitle").text(mClslineuptmpaModel.getLineuptitle()); */

                        /* set lineup */
                        for(let i in mClslineuptmpbModels)
                        {
                            let model = mClslineuptmpbModels[i];
                            let lineupidx = model.getLineupidx();
                            let lineupname = model.getLineupname();
                            CULT.addLineupBox("tmp", lineupidx, lineupname);
                        }
                        for(let i in mClslineuptmpcModels)
                        {
                            let model = mClslineuptmpcModels[i];
                            let dat =
                            {
                                LINEUPIDX  : model.getLineupidx(),
                                ORDERNO    : model.getOrderno(),
                                BATTINGFLG : model.getBattingflg(),
                                POSITION   : model.getPosition(),
                            };
                            CULT.addLineupRow("tmp", dat);
                        }
                        CULT.addLineupEvent();

                        /* 첫번째 라인업 선택 */
                        $(".CULT-div-lineupBtn[div-type='tmp']").find(".CULT-btn-lineupTab").first().click();

                        /* 화면 표시 */
                        CULT.movePageToLineupDetail();

                        Common.hideProgress();
                    }, ajaxDelayTime);
                });

                /* 전체적용 버튼 */
                $(".CULT-btn-clslineuptmpaRender").off("click").on("click", function()
                {
                    // let lineupgroup = $(this).attr("lineupgroup");
                    // let mClslineuptmpa = Api.Clslineuptmpa.selectByGrpnoLineupgroup(CULT.Data.grpno, lineupgroup);
                    // if(mClslineuptmpa.getModels().length == 0) { Common.toast("데이터를 불러오는데 실패했습니다."); return; }
                    // let model = mClslineuptmpa.getModels()[0];
                    // let dataForB = model.getDataForB();
                    // let dataForC = model.getDataForC();

                    // Common.showProgress();
                    // setTimeout(function()
                    // {
                    //     CUTF.applyLineupData(dataForB, dataForC);
                    //     Common.hideProgress();
                    //     Common.toast("라인업에 적용되었습니다.");
                    // }, ajaxDelayTime);
                });
            },

            /* ========================= */
            /* 최근일정 탭 */
            /* ========================= */
            searchForClsTab()
            {
                Common.showProgress();
                setTimeout(function()
                {
                    let grpno = CULT.Data.grpno;
                    let pagenum  = CULT.Data.pagenumcls;
                    let mClss = Api.Cls.selectByGrpnoForMng(grpno, pagenum);
                    let mClsModels = mClss.getModels();
                    let html = "";
                    for(let i in mClsModels)
                    {
                        let model = mClsModels[i];
                        let btnHtml =
                        `
                            <button class="CULT-btn-clslineuptmpaDetail common-btn-outline" clsno="${model.getClsno()}">상세보기</button>
                            <button class="CULT-btn-clslineuptmpaRender common-btn-outline" clsno="${model.getClsno()}">전체적용</button>
                        `;
                        html += model.make(btnHtml);
                    }
                    if(mClss.getPagecnt() > 1)
                    {
                        let pagenation = mClss.getPagenation();
                        html = pagenation + html + pagenation;
                    }
                    $("#CULT-div-clsList").html(html);
                    CULT.setEventForClsTab(); /* set event */

                    Common.hideProgress();
                }, ajaxDelayTime);
            },

            setEventForClsTab()
            {
                /* 페이지네이션 */
                $("#CULT-div-clsList .common-btn-pagenationBtn").off("click").on("click", function()
                {
                    let toPage = $(this).attr("to_page");
                    CULT.Data.pagenumcls = parseInt(toPage);
                    CULT.searchForClsTab();
                });

                /* 상세보기 버튼 */
                $(".CULT-btn-clslineuptmpaDetail").off("click").on("click", function()
                {
                    let grpno = CULT.Data.grpno;
                    let clsno = $(this).attr("clsno");
                    Common.showProgress();
                    setTimeout(function()
                    {
                        let mCls = Api.Cls.selectByPkForMng(grpno, clsno);
                        let mClslineupas = Api.Clslineupa.selectByClsno(grpno, clsno);
                        let mClslineupbs = Api.Clslineupb.selectByClsno(grpno, clsno);
                        let mClslineupaModels = mClslineupas.getModels();
                        let mClslineupbModels = mClslineupbs.getModels();

                        /* clear html */
                        $(".CULT-div-lineupBtn[div-type=tmp]").empty();
                        $(".CULT-div-lineupDetails[div-type=tmp]").empty();

                        /* set title */
                        $(".CULT-div-detailHeader").html(mCls.make());

                        /* set lineup */
                        for(let i in mClslineupaModels)
                        {
                            let model = mClslineupaModels[i];
                            let lineupidx = model.getLineupidx();
                            let lineupname = model.getLineupname();
                            CULT.addLineupBox("tmp", lineupidx, lineupname);
                        }
                        for(let i in mClslineupbModels)
                        {
                            let model = mClslineupbModels[i];
                            let dat =
                            {
                                LINEUPIDX  : model.getLineupidx(),
                                ORDERNO    : model.getOrderno(),
                                BATTINGFLG : model.getBattingflg(),
                                POSITION   : model.getPosition(),
                            };
                            CULT.addLineupRow("tmp", dat);
                        }
                        CULT.addLineupEvent();

                        /* 첫번째 라인업 선택 */
                        $(".CULT-div-lineupBtn[div-type='tmp']").find(".CULT-btn-lineupTab").first().click();

                        /* 화면 표시 */
                        CULT.movePageToLineupDetail();

                        Common.hideProgress();
                    }, ajaxDelayTime);
                });

                /* 전체적용 버튼 */
                $(".CULT-btn-clslineuptmpaRender").off("click").on("click", function()
                {
                    // let clsno = $(this).attr("clsno");
                    // let mClslineuptmpa = Api.Clslineuptmpa.selectByGrpnoLineupgroup(CULT.Data.grpno, clsno);
                    // if(mClslineuptmpa.getModels().length == 0) { Common.toast("데이터를 불러오는데 실패했습니다."); return; }
                    // let model = mClslineuptmpa.getModels()[0];
                    // let dataForB = model.getDataForB();
                    // let dataForC = model.getDataForC();

                    // Common.showProgress();
                    // setTimeout(function()
                    // {
                    //     CUTF.applyLineupData(dataForB, dataForC);
                    //     Common.hideProgress();
                    //     Common.toast("라인업에 적용되었습니다.");
                    // }, ajaxDelayTime);
                });
            },

            /* ========================= */
            /* 참가설정에 적용 */
            /* ========================= */

            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                if(force == true)
                {
                    Navigation.moveBack();
                    return;
                }
                Navigation.moveBack();
            },
        }

        $(document).ready(function()
        {
            /* ======================== */
            /* 이벤트 */
            /* ======================== */

            /* =============== */
            /* 뒤로가기 */
            /* =============== */
            $(".CULT-btn-back").click(function() { CULT.moveBack(); });

            /* =============== */
            /* 저장하기 */
            /* =============== */
            $("#CULT-btn-toSaveTab").click(function()
            {
                /* 페이지 이동 */
                CULT.movePage(CULT.Const.PAGE_MENU, CULT.Const.PAGE_SAVE);

                /* 라인업 데이터 가져오기 */
                let data = CUTF.getLineupData();
                let lineuparr = [];
                for(let i in data)
                {
                    let dat = data[i];
                    CULT.addLineupBox("save", dat.LINEUPIDX, dat.LINEUPNAME);
                    CULT.addLineupRow("save", dat);
                }
                CULT.addLineupEvent();

                /* 첫번째 라인업 선택 */
                $(".CULT-div-lineupBtn[div-type='save']").find(".CULT-btn-lineupTab").first().click();
            });

            /* =============== */
            /* 저장하기 > 저장 */
            /* =============== */
            $("#CULT-btn-save").click(function()
            {
                let process = function()
                {
                    /* get input */
                    let lineuptitle = $("#CULT-input-lineuptitle").val().trim();

                    /* get data */
                    let dataForB = [];
                    let dataForC = [];
                    $(".CULT-div-lineupDetails[div-type='save'] > .CULT-div-lineupTab").each(function()
                    {
                        let lineupidx = $(this).attr("lineupidx");
                        let lineupname = $(this).find(".CULT-span-lineupname").text();
                        dataForB.push(
                        {
                            LINEUPIDX  : lineupidx,
                            LINEUPNAME : lineupname,
                        });

                        $(`.CULT-tbl-lineupTeam[div-type='save'][lineupidx="${lineupidx}"] > tbody > tr`).each(function()
                        {
                            let orderno = $(this).find("td[col='numb']").attr("orderno");
                            let battingflg = $(this).find("td[col='batf']").attr("battingflg");
                            let position = $(this).find("td[col='pstn']").attr("position");
                            dataForC.push(
                            {
                                LINEUPIDX  : lineupidx,
                                ORDERNO    : orderno,
                                BATTINGFLG : battingflg,
                                POSITION   : position,
                            });
                        });
                    });

                    /* save */
                    Common.showProgress();
                    setTimeout(function()
                    {
                        /* save process */
                        let saveProcess = function()
                        {
                            Api.Clslineuptmpa.insertFromPage(CULT.Data.grpno, lineuptitle, dataForB, dataForC, GGF.toast, GGF.toast);
                            Common.hideProgress();
                        }

                        /* check duplicate */
                        let mClslineuptmpas = Api.Clslineuptmpa.selectByGrpnoLineuptitle(CULT.Data.grpno, lineuptitle, GGF.none, GGF.toast);
                        if(mClslineuptmpas.getModels().length > 0)
                            Common.confirm2("같은 이름의 템플릿이 이미 존재합니다. 덮어쓰시겠습니까?", saveProcess, function() { Common.hideProgress(); });
                        else
                            saveProcess();

                    }, ajaxDelayTime);
                }
                Common.confirm2("현재 라인업을 템플릿으로 저장하시겠습니까?", process);
            });

            /* =============== */
            /* 불러오기 */
            /* =============== */
            $("#CULT-btn-toLoadTab").click(function()
            {
                CULT.movePage(CULT.Const.PAGE_MENU, CULT.Const.PAGE_LOAD);
            });

            /* =============== */
            /* 불러오기 > 탭 선택 */
            /* =============== */
            $(".CULT-td-loadtab").click(function()
            {
                let tab = $(this).attr("loadtab");
                CULT.Data.tab = tab;
                $(".CULT-div-loadtab").hide();
                $(`.CULT-div-loadtab[loadtab='${tab}']`).show();

                /* process by tab */
                switch(tab)
                {
                    case "def":
                    {

                        break;
                    }
                    case "tmp":
                    {
                        Common.showProgress();
                        setTimeout(function()
                        {
                            /* set models */
                            let mClslineuptmpas = Api.Clslineuptmpa.selectByGrpno(CULT.Data.grpno);
                            let mClslineuptmpasModels = mClslineuptmpas.getModels();
                            let html = "";
                            for(let i in mClslineuptmpasModels)
                            {
                                let model = mClslineuptmpasModels[i];
                                let lineupgroup = model.getLineupgroup();
                                let btnHtml =
                                `
                                    <button class="CULT-btn-clslineuptmpaDetail common-btn-outline" lineupgroup="${lineupgroup}">상세보기</button>
                                    <button class="CULT-btn-clslineuptmpaRender common-btn-outline" lineupgroup="${lineupgroup}">전체적용</button>
                                `;
                                html += model.make(btnHtml);
                            }
                            $("#CULT-div-tmpList").html(html);
                            CULT.setEventForTmpTab(); /* set event */

                            Common.hideProgress();
                        }, ajaxDelayTime);
                        break;
                    }
                    case "cls":
                    {
                        CULT.searchForClsTab();
                        break;
                    }
                }
            });

            /* ========================= */
            /* page process */
            /* ========================= */
            try
            {
                CULT.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                CULT.close(true);
            }
        });

    </script>

</ons-page>
