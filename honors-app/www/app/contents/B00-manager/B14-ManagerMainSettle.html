<ons-page id="MMST">

    <!-- ======================== -->
    <!-- 페이지용 타이틀 -->
    <!-- ======================== -->
    <ons-toolbar>
        <div class="left"><gg-backbtn onclick="MMST.close(true);"></gg-backbtn></div>
        <div class="center">정산</div>
    </ons-toolbar>

    <!-- ----- -->
    <!-- 선택 탭 -->
    <!-- ----- -->
    <div class="common-div-cushion">
        <table class="MMST-tbl-common common-tbl-tab commonEvent-tbl-tab">
            <tbody>
                <tr>
                    <td class="MMST-td-searchtype" val="open" tab="tab" >처리중</td> <!-- 미입금 + 입금완료 -->
                    <td class="MMST-td-searchtype" val="loss" tab=""    >손실</td>
                    <td class="MMST-td-searchtype" val="done" tab=""    >완료</td>
                </tr>
            </tbody>
        </table>
    </div>
    <hr class="common-hr-paddingLR"/>

    <!-- ========================= -->
    <!-- 처리중 -->
    <!-- ========================= -->
    <div class="MMST-div-tab" tab="open" style="display:none;">
        <div class="common-div-cushion">
            <ul class="common-ul-announce">
                <li>입금처리가 완료되지 않은 건을 조회합니다.</li>
            </ul>
        </div>
        <div id="MMST-div-openList"></div>
    </div>

    <!-- ========================= -->
    <!-- 손실 -->
    <!-- ========================= -->
    <div class="MMST-div-tab" tab="loss" style="display:none;">
        <div class="common-div-cushion">
            <ul class="common-ul-announce">
                <li>특정 사유로 손실처리된 건을 조회합니다.</li>
            </ul>
        </div>
        <div id="MMST-div-lossList"></div>
    </div>

    <!-- ========================= -->
    <!-- 완료 -->
    <!-- ========================= -->
    <div class="MMST-div-tab" tab="done" style="display:none;">
        <div class="common-div-cushion">
            <ul class="common-ul-announce">
                <li>입금처리가 완료된 건을 조회합니다.</li>
            </ul>
        </div>
        <div id="MMST-div-doneList"></div>
    </div>

    <script>
        var MMST =
        {
            code : "MMST",
            Data: {},

            show()
            {
                /* validation param */
                if(MMST.Data.grpno == undefined) { Common.toast("잘못된 접근입니다."); MMST.close(); return; }
                if(MMST.Data.searchtype == undefined) { MMST.Data.searchtype = "open"; }
                if(MMST.Data.pagenoDone == undefined) { MMST.Data.pagenoDone = 1; }

                /* set tab */
                $(`.MMST-td-searchtype[val='${MMST.Data.searchtype}']`).click();

                // Common.showProgress();
                // setTimeout(function()
                // {
                // }, ajaxDelayTime);
            },

            search()
            {
                Common.showProgress();
                setTimeout(function()
                {
                    try
                    {
                        /* get var */
                        let grpno = MMST.Data.grpno;
                        let searchtype = MMST.Data.searchtype;

                        /* 탭별표시 */
                        switch(searchtype)
                        {
                            case "open":
                            {
                                let mClssettles = Api.Clssettle.selectSettlestatusOpenByGrpnoForMng(grpno, GGF.none, GGF.toast);
                                mClssettles.make("#MMST-div-openList");
                                break;
                            }
                            case "done":
                            {
                                let mClssettles = Api.Clssettle.selectSettlestatusDoneByGrpnoWithPageForMng(grpno, MMST.Data.pagenoDone, GGF.none, GGF.toast);
                                mClssettles.make("#MMST-div-doneList");

                                /* set event */
                                $("#MMST-div-doneList .common-btn-pagenationBtn").click(function()
                                {
                                    let toPage = $(this).attr("to_page");
                                    MMST.Data.pagenoDone = toPage;
                                    MMST.search(MMST.Data.searchtype);
                                });
                                break;
                            }
                            case "loss":
                            {
                                let mClssettles = Api.Clssettle.selectSettlestatusLossByGrpnoForMng(grpno, GGF.none, GGF.toast);
                                mClssettles.make("#MMST-div-lossList");
                                break;
                            }
                        }
                        /* show / hide */
                        $(".MMST-div-tab").hide();
                        $(`.MMST-div-tab[tab='${searchtype}']`).show();
                    }
                    catch(e)
                    {
                        Common.catchProc(e);
                    }
                    Common.hideProgress();
                }, ajaxDelayTime);
            },


            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                Navigation.moveBack();
            },
        }

        $(document).ready(function()
        {
            /* ========================= */
            /* event */
            /* ========================= */

            $(".MMST-td-searchtype").click(function()
            {
                /* 선택된 탭 표시 */
                let searchtype = $(this).attr("val");
                $(".MMST-td-searchtype").removeAttr("tab");
                $(this).attr("tab", "tab");

                /* save selected */
                MMST.Data.searchtype = searchtype;

                /* search */
                MMST.search(searchtype);
            });


            /* ========================= */
            /* page process */
            /* ========================= */

            /* get data from Config */
            try
            {
                MMST.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                MMST.close(true);
            }

        }); /* end function */

    </script>
</ons-page>
