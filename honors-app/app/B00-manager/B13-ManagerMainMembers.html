<ons-page id="MMMB">

    <!-- ======================== -->
    <!-- 페이지용 타이틀 -->
    <!-- ======================== -->
    <ons-toolbar>
        <div class="left"><gg-backbtn onclick="MMMB.close(true);"></gg-backbtn></div>
        <div class="center">멤버</div>
    </ons-toolbar>

    <!-- ======================== -->
    <!-- choose -->
    <!-- ======================== -->
    <div class="common-div-cushion">
        <table class="common-tbl-tab commonEvent-tbl-tab">
            <tbody>
                <tr>
                    <td class="MMMB-td-searchtype" searchtype="all"       tab="tab" >전체</td>
                    <td class="MMMB-td-searchtype" searchtype="manager"   tab=""    >관리자</td>
                    <td class="MMMB-td-searchtype" searchtype="normem"    tab=""    >멤버</td>
                    <td class="MMMB-td-searchtype" searchtype="tmpmem"    tab=""    >임시</td>
                </tr>
            </tbody>
        </table>
    </div>
    <hr class="common-hr-paddingLR"/>

    <!-- ========================= -->
    <!-- 검색 -->
    <!-- ========================= -->
    <div id="MMMB-div-search" class="common-div-cushion common-search-div-top">
        <input type="text" id="MMMB-input-searchkey" class="common-input-text"/>
        <button id="MMMB-btn-search" class="common-btn-outline" btn-size="search">🔍 검색</button>
        <div class="common-tag-block common-tag-fontsize09">
            <span id="MMMB-span-searchedCnt"></span>건 검색되었습니다.
        </div>
    </div>

    <!-- ========================= -->
    <!-- list -->
    <!-- ========================= -->
    <div id="MMMB-div-list"></div>

    <div class="common-div-cushionFooter"></div>
    <script>
        var MMMB =
        {
            code : "MMMB",

            show()
            {
                if(MMMB.Data.grpno      == undefined) { Common.toast("잘못된 접근입니다."); MMMB.close(); return; }
                if(MMMB.Data.searchtype == undefined) { MMMB.Data.searchtype = "all"; }
                if(MMMB.Data.searchkey  == undefined) { MMMB.Data.searchkey = ""; }
                if(MMMB.Data.pagenum    == undefined) { MMMB.Data.pagenum = 1; }

                /* set searchkey */
                $("#MMMB-input-searchkey").val(MMMB.Data.searchkey);

                /* 멤버 리스트 조회 */
                $(`.MMMB-td-searchtype[searchtype='${MMMB.Data.searchtype}']`).click();
            },

            search(searchtype)
            {
                Common.showProgress();
                setTimeout(function()
                {
                    let grpno = MMMB.Data.grpno;
                    let pagenum = MMMB.Data.pagenum;
                    let searchkey = $("#MMMB-input-searchkey").val();
                    if(MMMB.Data.searchtype != searchtype)
                        pagenum = 1;

                    let mGrpMembers = null;
                    switch(searchtype)
                    {
                        case "all"      : { mGrpMembers = Api.GrpMember.selectByGrpnoUsernameSearchtypeForAll (pagenum, MMMB.Data.grpno, searchkey, "all"); break; }
                        case "manager"  : { mGrpMembers = Api.GrpMember.selectByGrpnoUsernameSearchtypeForAll (pagenum, MMMB.Data.grpno, searchkey, "manager"); break; }
                        case "normem"   : { mGrpMembers = Api.GrpMember.selectByGrpnoUsernameSearchtypeForAll (pagenum, MMMB.Data.grpno, searchkey, "normem"); break; }
                        case "tmpmem"   : { mGrpMembers = Api.GrpMember.selectByGrpnoUsernameSearchtypeForAll (pagenum, MMMB.Data.grpno, searchkey, "tmpmem"); break; }
                    }
                    mGrpMembers.make("#MMMB-div-list");
                    $("#MMMB-span-searchedCnt").text(mGrpMembers.getAllcnt());

                    /* set event */
                    $("#MMMB-div-list .common-btn-pagenationBtn").click(function()
                    {
                        let toPage = $(this).attr("to_page");
                        MMMB.Data.pagenum = toPage;
                        MMMB.search(MMMB.Data.searchtype);
                    });

                    /* save selected */
                    MMMB.Data.searchkey = searchkey;
                    MMMB.Data.searchtype = searchtype;

                    Common.hideProgress();
                }, ajaxDelayTime);
            },


            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                Navigation.moveBack();
            },
        }

        $(document).ready(function()
        {
            /* ========================= */
            /* event */
            /* ========================= */
            $(".MMMB-td-searchtype").click(function()
            {
                let searchtype = $(this).attr("searchtype");
                $("#MMMB-input-searchkey").val("");
                MMMB.search(searchtype);
            });

            $("#MMMB-btn-search").click(function()
            {
                MMMB.Data.pagenum = 1;
                MMMB.search(MMMB.Data.searchtype);
            });

            /* ========================= */
            /* page process */
            /* ========================= */

            /* get data from Config */
            try
            {
                MMMB.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                MMMB.close(true);
            }

        }); /* end function */

    </script>
</ons-page>
