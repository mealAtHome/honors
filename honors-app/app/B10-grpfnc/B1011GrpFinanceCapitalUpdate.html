<ons-page id="GFCU">

    <!-- --------------- -->
    <!-- 페이지용 타이틀 -->
    <!-- --------------- -->
    <ons-toolbar id="GFCU-toolbar">
        <div class="left"><gg-backbtn onclick="GFCU.close(true);"></gg-backbtn></div>
        <div class="center"><span id="GFCU-span-title">자본금 변경</span></div>
    </ons-toolbar>

    <div class="common-div-formChild">

        <!-- --------------- -->
        <!-- 자본금 변경 -->
        <!-- --------------- -->
        <div class="GFCU-div-tab" tab="input">

            <!-- 타이틀 -->
            <div class="common-div-formTitle">
                <span>자본금 변경</span>
                <!-- <span class="GFCU-span-choosedPosition"></span> -->
            </div>

            <!-- 안내 -->
            <ul class="common-ul-announce">
                <li>모임의 기존 자본금을 표시합니다.</li>
                <li>모임을 운영중에 저희 시스템을 도입했을 때, 도입 당시까지의 누적금 등을 관리하는 용도로 사용할 수 있습니다.</li>
            </ul>

            <!-- 자본금 변경 -->
            <div class="common-div-formField">
                <span>자본금</span>
                <span>숫자만 입력하실 수 있습니다.</span>
                <input id="GFCU-input-capital" type="number" class="common-input-field"/>
                <div class="common-div-cushionUD">
                    <div class="common-tag-block"><span>현재 자본금 : </span><span id="GFCU-span-originalWon"    number=""></span></div>
                    <div class="common-tag-block"><span>입력 자본금 : </span><span id="GFCU-span-capitalWon"     number=""></span></div>
                    <div class="common-tag-block"><span>자본금 차액 : </span><span id="GFCU-span-differenceWon"  number=""></span></div>
                </div>
            </div>

            <!-- 코멘트 입력 -->
            <div class="common-div-formField">
                <span>변경사유</span>
                <span>자본금 변경사유를 입력해주세요.</span>
                <textarea id="GFCU-textarea-comment" class="common-textarea-field" rows="5" placeholder="변경사유를 입력해주세요."></textarea>
            </div>

            <!-- 다음으로 -->
            <table class="common-tbl-slideformFooterBtn" tbl-type="button1">
                <tbody>
                    <tr>
                        <td><button id="GFCU-btn-apply" class="common-btn-inline">적용하기</button></td>
                    </tr>
                </tbody>
            </table>

        </div> <!-- 자본금 변경 -->

        <!-- --------------- -->
        <!-- 변경이력 -->
        <!-- --------------- -->
        <div class="GFCU-div-tab" tab="history" style="display:none;">

            <!-- 타이틀 -->
            <div class="common-div-formTitle">
                <span>자본금 변경이력</span>
                <!-- <span class="GFCU-span-choosedPosition"></span> -->
            </div>

            <!-- 변경이력 전체 -->
            <div class="common-div-formField">
                <span>변경이력 전체</span>
                <span>모임의 자본금 변경이력을 모두 표시합니다.</span>
                <div id="GFCU-div-historyAll"></div>
            </div>

        </div> <!-- 변경이력 -->

    </div> <!-- formChild -->

    <script>
        var GFCU =
        {
            code : "GFCU",
            Data: {},

            /* ===================== */
            /* show */
            /* ===================== */
            show()
            {
                if(Common.isEmpty(GFCU.Data.grpno)) { Common.toast("잘못된 접근입니다."); GFCU.close(true); return; }

                /* init */
                Common.showProgress();
                setTimeout(function()
                {
                    try
                    {
                        /* vars */
                        let grpno = GFCU.Data.grpno;

                        /* get capital */
                        let mGrpfnca = Api.Grpfnca.selectByPk(grpno).getModel();
                        if(mGrpfnca == null)
                        {
                            Common.toast("모임 정보를 불러올 수 없습니다.");
                            GFCU.close(true);
                            return;
                        }

                        /* init html */
                        $("#GFCU-input-capital").val(mGrpfnca.getGrpfncCapitaltotal());
                        $("#GFCU-span-originalWon").html(mGrpfnca.getGrpfncCapitaltotalWon());
                        $("#GFCU-span-originalWon").attr("number", mGrpfnca.getGrpfncCapitaltotal());
                        $("#GFCU-input-capital").keyup();
                    }
                    catch(e)
                    {
                        Common.catchProc(e);
                        return;
                    }
                    finally
                    {
                        Common.hideProgress();
                    }
                }, ajaxDelayTime);
            },

            /* ========================= */
            /* close */
            /* ========================= */
            close(force=false)
            {
                if(force == true)
                {
                    Navigation.moveBack();
                    return;
                }
                Navigation.moveBack();
            },
        }

        $(document).ready(function()
        {
            /* ======================== */
            /* event */
            /* ======================== */

            /* 금액 입력 시, 업데이트 */
            $("#GFCU-input-capital").keyup(function()
            {
                let original = Number($("#GFCU-span-originalWon").attr("number"));
                let capital  = Number($("#GFCU-input-capital").val().trim());
                let difference = capital - original;
                $("#GFCU-span-capitalWon").html(GGC.Common.priceWon(capital) );
                $("#GFCU-span-differenceWon").html(GGC.Common.priceWon(difference));
            });


            /*  */
            $("#GFCU-btn-apply").click(function()
            {
                let grpno = GFCU.Data.grpno;
                let capital = $("#GFCU-input-capital").val().trim();
                let comment = $("#GFCU-textarea-comment").val().trim();
                let process = function()
                {
                    Common.showProgress();
                    setTimeout(function()
                    {
                        let mApiResponse = Api.Grpfnca.updateCapitaltotalByPk(grpno, capital, comment, GGF.toast, GGF.toast);
                        if(mApiResponse.isSuccess())
                        {
                            Common.hideProgress();
                            return;
                        }
                        Common.hideProgress();
                    }, ajaxDelayTime);
                };
                Common.confirm2(`적용하시겠습니까?`, process);
            });

            /* ========================= */
            /* page process */
            /* ========================= */

            /* get data from Config */
            try
            {
                GFCU.Data = Navigation.getPageParam();
                Navigation.executeShow();
            }
            catch(e)
            {
                console.error(e);
                GFCU.close(true);
            }

        });

    </script>


</ons-page>
